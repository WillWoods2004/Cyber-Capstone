services:
  api:
    build:
      context: ../../nk/api
      dockerfile: Dockerfile
    image: securitypass-api:nksf2
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8080
      MOCK_TOKEN_SECRET: ${MOCK_TOKEN_SECRET:?set in .env}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://main.d18bgjfq8i2fkv.amplifyapp.com}
    ports:
      - "8080:8080"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
