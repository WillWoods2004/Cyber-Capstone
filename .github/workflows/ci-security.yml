name: ci-security

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm audit --json > frontend-audit.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-audit
          path: frontend/frontend-audit.json

  nk-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nk/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nk/api/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm audit --json > nk-api-audit.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: nk-api-audit
          path: nk/api/nk-api-audit.json

  nk-sdk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nk/sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nk/sdk/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm audit --json > nk-sdk-audit.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: nk-sdk-audit
          path: nk/sdk/nk-sdk-audit.json
